name: Playwright Tests

on:
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same PR to avoid redundant work
concurrency:
  group: playwright-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Minimal read-only permissions at workflow level; playwright-tests overrides with Pages write
permissions:
  contents: read

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Override workflow-level permissions to allow GitHub Pages publishing
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}

    env:
      CI: true

    steps:
      # Check out the repository at the PR commit
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up the latest LTS Node.js with Yarn cache
      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      # Install dependencies from the lockfile without mutations
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      # Download and install Playwright browsers plus system dependencies
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      # Run the full Playwright test suite in parallel
      - name: Run Playwright tests
        run: yarn playwright test

      # Upload the HTML report so it can be inspected after the run
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

      # Upload Playwright traces for failed-test debugging
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip
          retention-days: 30

      # Notify Microsoft Teams when the workflow fails
      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "summary": "Playwright Tests failed",
              "themeColor": "FF0000",
              "title": "❌ Playwright Tests failed",
              "sections": [
                {
                  "facts": [
                    { "name": "PR Title",  "value": "${{ github.event.pull_request.title }}" },
                    { "name": "Author",    "value": "${{ github.event.pull_request.user.login }}" },
                    { "name": "Branch",    "value": "${{ github.head_ref }}" },
                    { "name": "Run",       "value": "[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" }
                  ]
                }
              ]
            }'

      # ── GitHub Pages publish (main branch only) ──────────────────────────────

      # Fetch existing history.json from gh-pages branch (if any) and merge with
      # a new entry for this run, then write the result into playwright-report/.
      - name: Build history.json
        if: always() && github.ref == 'refs/heads/main'
        run: |
          PRIOR="[]"
          # Try to retrieve the existing history from gh-pages
          if git fetch origin gh-pages --depth=1 2>/dev/null; then
            PRIOR=$(git show origin/gh-pages:history.json 2>/dev/null || echo "[]")
          fi

          # Compose a new entry for this run
          NEW_ENTRY=$(jq -n \
            --arg ts      "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg sha      "${{ github.sha }}" \
            --arg ref      "${{ github.ref }}" \
            --arg result   "${{ job.status }}" \
            '{ timestamp: $ts, run_url: $run_url, sha: $sha, ref: $ref, result: $result }')

          # Append and write back (keep last 100 entries)
          echo "$PRIOR" | jq --argjson entry "$NEW_ENTRY" '. + [$entry] | .[-100:]' \
            > playwright-report/history.json

      # Package the HTML report directory as a Pages artifact
      - name: Upload Pages artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      # Deploy the packaged artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deploy-pages
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      - name: Run dependency vulnerability scan
        id: audit
        run: |
          echo "## Dependency Vulnerability Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if yarn audit --level high 2>&1 | tee audit-output.txt; then
            echo "✅ No high or critical vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ High or critical vulnerabilities detected:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "(high|critical|moderate)" audit-output.txt | head -50 >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
